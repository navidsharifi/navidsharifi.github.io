<style>
  .experience-container .layout.layout-left {
    margin-bottom: 3rem;
  }

  .experience-container .layout.layout-left:last-child {
    margin-bottom: 0;
  }
</style>

<div class="container experience-container">
  <div class="row clearfix">
    <div class="col-xs-12 col-sm-offset-4 col-sm-8 col-md-offset-3 col-md-9 col-print-12">
      <h3 class="section-title">{{ site.experience_title | default: "Experience" }}</h3>
    </div>
  </div>
  {% for experience in site.data.experience %}
    {% include {{ experience.layout | default: 'left' | append: ".html" }} item=experience %}
  {% endfor %}
</div>
