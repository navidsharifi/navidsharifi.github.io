# About Section
# about_title: About Me (Use this to override about section title)
about_profile_image: images/profile.png #Directory of profile image (eg. images/profile.jpg)
about_content: | # this will include new lines to allow paragraphs
  
  <section>
    <h3>About</h3>
  <p>
  With a background in project management, I am experienced in controlling EPC projects for large-scale initiatives. During the project, I developed practical skills in managing complex systems, coordinating different stakeholders, and understanding how decisions affect project performance in real-world environments.
  Alongside this, Building experience in business and system analysis, as well as process re-engineering, was me further step. How data and analytical methods can be used to improve business operations and support better decision-making is what I am working on. I am learning simulation models, such as discrete-event simulation, to analyse system performance and explore ways to improve efficiency under uncertainty.
  Combining my PM experience with analytical and modelling approaches to better understand and improve operational systems further develops my theoretical knowledge.
  </p>
  </section>
  
  <section>
    <h3>Key Expertise</h3>
  <details>
  <summary><strong>▸ Areas of expertise <span class="badge badge-soon">Click to expand</span></strong></summary>
  <br>
  <ul>
    <li><strong>Project Management &amp; Operations</strong>: Project planning and control based on PMBOK standards, with experience in EPC project environments. Skilled in project life-cycle management and knowledge areas, specifically scheduling and resource management.</li>
    <li><strong>Business Analytics &amp; Decision Support</strong>: Experience in data-driven decision-making, including KPI development, performance monitoring, and dashboard design.</li>
    <li><strong>Operational Research &amp; Modelling</strong>: Strong interest in optimisation and modelling, including mathematical modelling, cost function analysis, and inventory control systems.</li>
    <li><strong>Data Analysis &amp; ML</strong>: Familiar with Python and SQL Server for data analysis and manipulation. Experience with ETL processes, feature engineering, and ML supervised and unsupervised algorithms.</li>
    <li><strong>Business Process Improvement</strong>: Background in business process re-engineering, including system analysis, process mining, evaluation, and modelling.</li>
  </ul>
  </details>
  </section>
  
  <section>
    <h3>Interests</h3>
    <p>
      I am particularly interested in simulation-based optimisation approaches, where analytical models and simulation are combined to address complex and uncertain decision problems.
    </p>
    <ul>
      <li>Supply chain operations optimisation (discrete-event simulation)</li>
      <li>Queue systems modelling in logistics networks</li>
      <li>Simulation-based analysis of resource allocation</li>
      <li>Simulation approaches for operational decision-making problems</li>
    </ul>
  </section>
  
